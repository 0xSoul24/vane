    # The item used to apply the style to the portal.
    Accept:
      Name: "§a§lStili Uygula"
      Lore: [ ]

    # The item used to reset all changes made in this menu.
    Reset:
      Name: "§6§lDeğişiklikleri sıfırla"
      Lore: [ ]

    # The title for the predefined style selector.
    SelectStyleTitle: "§8§lStil Seç"
    # The filter title for the predefined style selector.
    FilterStylesTitle: "§8§lStilleri Filtrele"
    # The item used to open the style selector for predefined styles.
    SelectDefined:
      Name: "§b§lTanımlı Stili Seçin"
      Lore: [ ]
    # The item used to represent a predefined style.
    # %1$s: Name of the style
    SelectStyle:
      Name: "%1$s"
      Lore: [ ]

    # The item used to discard any changes and return to the previous menu.
    Cancel:
      Name: "§6↩ §lDeğişiklikleri Gözardı Et"
      Lore: [ ]

  # Settings for the portal console menu.
  Console:
    # The title for the console menu.
    # %1$s: Portal name
    Title: "§8§lPortal: %1$s"

    # The item used to open the portal's settings.
    Settings:
      Name: "§b§lAyarlar"
      Lore: [ ]

    # The item used to open the portal's target selector.
    # %1$s: The currently selected target
    SelectTarget:
      Name: "§d§lHedef Seç"
      Lore:
        - ""
        - "§7Mevcut: %1$s"
    # The item used to show the current target when the target is locked.
    # %1$s: The currently selected target
    SelectTargetLocked:
      Name: "§d§lHedef Seç"
      Lore:
        - ""
        - "§7Mevcut: %1$s"
        - "§8Seçilen hedefe §6§lKİLİTLENİLDİ§r§8!"

    SelectTargetTitle: "§8§lHedef Portalı Seçin"
    FilterPortalsTitle: "§8§lPortalları Filtrele"
    # The item used to represent a target portal.
    # %1$s: Portal name
    # %2$s: Portal distance
    # %3$s: Portal world
    # %4$s: Portal visibility (defined below, public, private, ...)
    SelectTargetPortal:
      Name: "%1$s"
      Lore:
        - ""
        - "§7Mesafe: %2$s§6m"
        - "§7Dünya: %3$s"
        - "§7%4$s"
    SelectTargetPortalVisibilityPublic: "§aHerkese Açık"
    SelectTargetPortalVisibilityGroup: "§eBölge Grubu (üyeler)"
    SelectTargetPortalVisibilityGroupInternal: "§eBölge Grubu (Sadece dahili olarak görünür)"
    SelectTargetPortalVisibilityPrivate: "§cGizli"

    # The item used to unlink the current console.
    UnlinkConsole:
      Name: "§c§lKonsol Bağlantısını Kes"
      Lore: [ ]
    # The title for the unlinking confirmation dialog.
    UnlinkConsoleConfirmTitle: "§c§lKonsol Bağlantısını Kesmek istiyor musun?"
    # The item to accept unlinking.
    UnlinkConsoleConfirmAccept:
      Name: "§c§lKONSOL BAĞLANTISINI KES"
      Lore: [ ]
    # The item to cancel unlinking.
    UnlinkConsoleConfirmCancel:
      Name: "§a§lİptal Etmek"
      Lore: [ ]

    # The item used to destroy the portal.
    DestroyPortal:
      Name: "§c§lPortalı yok et"
      Lore: [ ]
    # The title for the destroy portal confirmation dialog.
    DestroyPortalConfirmTitle: "§c§lPortalı Yok Etmek İster Misin?"
    # The item to accept destroying.
    DestroyPortalConfirmAccept:
      Name: "§c§lPORTALI YOK ET"
      Lore: [ ]
    # The item to cancel destroying.
    DestroyPortalConfirmCancel:
      Name: "§a§lİptal Etmek"
      Lore: [ ]
