      Lore: [ "", "§aVariante 5", "§7Material de construcción: %1$s" ]

    # El ítem utilizado para aplicar el estilo al portal.
    Accept:
      Name: "§a§lAplicar Estilo"
      Lore: [ ]

    # El ítem utilizado para restablecer todos los cambios realizados en este menú.
    Reset:
      Name: "§6§lRestablecer Cambios"
      Lore: [ ]

    # El título para el selector de estilos predefinidos.
    SelectStyleTitle: "§8§lSeleccionar Estilo"
    # El título para el filtro del selector de estilos predefinidos.
    FilterStylesTitle: "§8§lFiltrar Estilos"
    # El ítem utilizado para abrir el selector de estilos para estilos predefinidos.
    SelectDefined:
      Name: "§b§lSeleccionar Estilo Definido"
      Lore: [ ]
    # El ítem utilizado para representar un estilo predefinido.
    # %1$s: Nombre del estilo
    SelectStyle:
      Name: "%1$s"
      Lore: [ ]

    # El ítem utilizado para descartar cualquier cambio y volver al menú anterior.
    Cancel:
      Name: "§6↩ §lDescartar Cambios"
      Lore: [ ]

  # Configuración para el menú de consola del portal.
  Console:
    # El título para el menú de consola.
    # %1$s: Nombre del portal
    Title: "§8§lPortal: %1$s"

    # El ítem utilizado para abrir la configuración del portal.
    Settings:
      Name: "§b§lConfiguración"
      Lore: [ ]

    # El ítem utilizado para abrir el selector de destino del portal.
    # %1$s: El destino actualmente seleccionado
    SelectTarget:
      Name: "§d§lSeleccionar Destino"
      Lore:
        - ""
        - "§7Actual: %1$s"
    # El ítem utilizado para mostrar el destino actual cuando el destino está bloqueado.
    # %1$s: El destino actualmente seleccionado
    SelectTargetLocked:
      Name: "§d§lSeleccionar Destino"
      Lore:
        - ""
        - "§7Actual: %1$s"
        - "§8¡La selección de destino está §6§lBLOQUEADA§r§8!"


    SelectTargetTitle: "§8§lSeleccionar Portal de Destino"
    FilterPortalsTitle: "§8§lFiltrar Portales"
    # El ítem utilizado para representar un portal de destino.
    # %1$s: Nombre del portal
    # %2$s: Distancia del portal
    # %3$s: Mundo del portal
    # %4$s: Visibilidad del portal (definido a continuación, público, privado, ...)
    SelectTargetPortal:
      Name: "%1$s"
      Lore:
        - ""
        - "§7Distancia: %2$s§6m"
        - "§7Mundo: %3$s"
        - "§7%4$s"
    SelectTargetPortalVisibilityPublic: "§aPúblico"
    SelectTargetPortalVisibilityGroup: "§eGrupo de Región (miembros)"
    SelectTargetPortalVisibilityGroupInternal: "§eGrupo de Región (solo visible internamente)"
    SelectTargetPortalVisibilityPrivate: "§cPrivado"

    # El ítem utilizado para desvincular la consola actual.
    UnlinkConsole:
      Name: "§c§lDesvincular Consola"
      Lore: [ ]
    # El título para el diálogo de confirmación de desvinculación.
    UnlinkConsoleConfirmTitle: "§c§l¿Desvincular consola?"
    # El ítem para aceptar la desvinculación.
    UnlinkConsoleConfirmAccept:
      Name: "§c§lDESVINCULAR CONSOLA"
      Lore: [ ]
    # El ítem para cancelar la desvinculación.
    UnlinkConsoleConfirmCancel:
      Name: "§a§lCancelar"
      Lore: [ ]

    # El ítem utilizado para destruir el portal.
    DestroyPortal:
      Name: "§c§lDestruir Portal"
      Lore: [ ]
    # El título para el diálogo de confirmación de destrucción del portal.
    DestroyPortalConfirmTitle: "§c§l¿Destruir portal?"
    # El ítem para aceptar la destrucción.
    DestroyPortalConfirmAccept:
      Name: "§c§lDESTRUIR PORTAL"
      Lore: [ ]
    # El ítem para cancelar la destrucción.
    DestroyPortalConfirmCancel:
      Name: "§a§lCancelar"
      Lore: [ ]
