# +---------------------------------------+
#
# ¡Se sobrescribirá silenciosamente con actualizaciones! Si deseas
# personalizar las cadenas tú mismo, copia este archivo a lang-custom.yml
# y establece el idioma en config.yml en "lang: 'custom'"

# ¡NO CAMBIAR! La versión de este archivo de idioma. Se utiliza para determinar
# si el archivo necesita actualizarse.
Version: 6
# El código de idioma correspondiente utilizado en paquetes de recursos. Utilizado para
# generación de paquetes de recursos. Por lo general, es una combinación de
# el código de idioma (ISO 639) y el código de país (ISO 3166).
ResourcePackLangCode: 'es_es'

# Este mensaje se envía cuando se ha seleccionado una nueva consola de portal
# y el jugador ahora puede seleccionar un bloque límite para construir un portal.
SelectBoundaryNow: "§6Haz clic derecho en el límite del portal ahora"
# Este mensaje se envía cuando el bloque de consola seleccionado ya no es del tipo correcto.
# Esto puede suceder cuando un jugador reemplaza el bloque de consola
# mientras está seleccionado como consola pendiente.
ConsoleInvalidType: "§c¡El bloque de consola tiene un tipo de bloque no válido!"
# Este mensaje se envía cuando la consola seleccionada está en otro mundo que el límite del portal.
ConsoleDifferentWorld: "§cLa consola debe estar en el mismo mundo que el portal"
# Este mensaje se envía cuando la consola de portal seleccionada está demasiado lejos de
# el límite del portal.
ConsoleTooFarAway: "§cLa consola está demasiado lejos del portal"
# Este mensaje se envía cuando se ha vinculado correctamente una consola.
ConsoleLinked: "§aConsola vinculada"

# Este mensaje se envía cuando no se encontró ningún límite en la ubicación dada.
NoBoundaryFound: "§c¡No se encontró límite del portal!"
# Este mensaje se envía cuando el límite seleccionado no contiene un bloque de origen
NoOrigin: "§c¡El portal no tiene un bloque de origen!"
# Este mensaje se envía cuando el límite seleccionado tiene múltiples bloques de origen
MultipleOrigins: "§c¡El portal no puede tener múltiples bloques de origen!"
# Este mensaje se envía cuando el límite vertical del portal seleccionado no tiene área de portal sobre el bloque de origen.
NoPortalBlockAboveOrigin: "§c¡El bloque de origen necesita área de portal encima!"
# Este mensaje se envía cuando el límite vertical del portal seleccionado no tiene suficiente área de portal sobre el bloque de origen.
NotEnoughPortalBlocksAboveOrigin: "§c¡El bloque de origen necesita al menos 3 bloques de área de portal encima!"
# Este mensaje se envía cuando el límite del portal seleccionado es demasiado grande en una dirección dada.
# %1$s: La dirección (x, y, z)
TooLarge: "§cEl portal es demasiado grande en la dirección %1$s§c"
# Este mensaje se envía cuando el límite del portal seleccionado es demasiado pequeño en una dirección determinada.
# %1$s: La dirección (x, y, z)
TooSmallSpawn: "§cEl área de generación es demasiado pequeña en la dirección %1$s"
# Este mensaje se envía cuando el límite del portal seleccionado contiene demasiados bloques de área de portal.
# %1$s: Cantidad actual de bloques
# %2$s: Cantidad máxima permitida de bloques
TooManyPortalAreaBlocks: "§cEl área del portal es demasiado grande. %1$s§6/%2$s§c bloques"
# Este mensaje se envía cuando se selecciona un límite del portal pero
# una parte del área está obstruida.
PortalAreaObstructed: "§c¡El área del portal está obstruida!"
# Este mensaje se envía cuando el límite seleccionado interseca con un portal existente.
IntersectsExistingPortal: "§cEl portal interseca con otro portal."

# Este mensaje se envía cuando un jugador no tiene permiso para construir un portal en el área.
BuildRestricted: "§cNo tienes permiso para construir un portal aquí."
# Este mensaje se envía cuando un jugador no tiene permiso para enlazar una consola a un portal.
LinkRestricted: "§cNo tienes permiso para enlazar una consola a este portal."

# Este mensaje se envía cuando se activa un portal, pero el destino ya está conectado a otro portal.
TargetAlreadyConnected: "§6El portal de destino ya está conectado a otro portal."
# Este mensaje se envía cuando se activa un portal, pero el jugador no tiene permiso para usarlo.
SourceUseRestricted: "§cNo tienes permiso para usar este portal."
# Este mensaje se envía cuando se activa un portal, pero el jugador no tiene permiso para usar el portal de destino.
TargetUseRestricted: "§cNo tienes permiso para usar el portal de destino."

# Esto se muestra en un ítem flotante sobre todas las consolas de portal de portales activados para indicar el portal conectado.
# CONSEJO: Los §r finales son importantes, de lo contrario, la etiqueta tendrá espacio vacío a la derecha
# %1$s: Nombre del portal de destino
ConsoleDisplayActive: "§6§l>§r %1$s §6§l<§r"
# Esto se muestra en un ítem flotante sobre todas las consolas de portal de portales inactivos para indicar el portal de destino seleccionado.
# CONSEJO: Los §r finales son importantes, de lo contrario, la etiqueta tendrá espacio vacío a la derecha
# %1$s: Nombre del portal de destino
ConsoleDisplayInactive: "§8§l>§r %1$s §8§l<§r"
# Esto es la sustitución de nombre utilizada para portales sin un portal de destino seleccionado.
ConsoleNoTarget: "§k?"

# Este mensaje se envía cuando un jugador intenta desvincular una consola para la cual no tiene permiso.
UnlinkRestricted: "§cNo tienes permiso para desvincular una consola de este portal."
# Este mensaje se envía cuando un jugador intenta destruir una consola para la cual no tiene permiso.
DestroyRestricted: "§cNo tienes permiso para destruir este portal."
# Este mensaje se envía cuando un jugador intenta cambiar una configuración de portal para la cual no tiene permiso.
SettingsRestricted: "§cNo tienes permiso para cambiar la configuración de este portal."
# Este mensaje se envía cuando un jugador intenta cambiar la selección de destino de un portal para el cual no tiene permiso.
SelectTargetRestricted: "§cNo tienes permiso para seleccionar un destino para este portal."

Dynmap:
  # La etiqueta para la capa de Dynmap
  LayerLabel: "Portales"
  # La etiqueta para los marcadores de Dynmap
  # %1$s: Nombre del portal
  MarkerLabel: "%1$s"

BlueMap:
  # La etiqueta para el conjunto de marcadores de BlueMap
  LayerLabel: "Portales"
  # La etiqueta para los marcadores de portal de BlueMap. Admite HTML. Los argumentos se escaparán correctamente.
  # %1$s: Nombre del portal
  MarkerLabel: "<span style=\"color: white\">🌌 %1$s</span>"

Menus:
  # Configuraciones para el menú de nombramiento del portal.
  EnterName:
    # El título para el menú de nombramiento.
    Title: "§8§lIngresa el nombre del portal"

  # Configuraciones para el menú de configuraciones del portal.
  Settings:
    # El título para el menú de configuraciones.
    # %1$s: Nombre del portal
    Title: "§8§lConfiguraciones: %1$s"
    # El título para el menú de selección de ícono.
    SelectIconTitle: "§8§lSeleccionar ícono"

    # Este ítem se utiliza para cambiar el nombre del portal.
    Rename:
      Name: "§b§lRenombrar"
      Lore: [ ]
    # Este ítem se utiliza para seleccionar el ícono del portal.
    SelectIcon:
      Name: "§b§lSeleccionar ícono"
      Lore: [ ]
    # Este ítem se utiliza para cambiar el estilo del portal.
    SelectStyle:
      Name: "§b§lSeleccionar estilo"
      Lore: [ ]
    # Este ítem se utiliza para cambiar e indicar el bloqueo de orientación de salida activado.
    ExitOrientationLockOn:
      Name: "§b§lAlternar bloqueo de orientación de salida"
      Lore: [ "", "§bActual: §e§lBloqueado (siempre hacia adelante)§r" ]
    # Este ítem se utiliza para cambiar e indicar el bloqueo de orientación de salida desactivado.
    ExitOrientationLockOff:
      Name: "§b§lAlternar bloqueo de orientación de salida"
      Lore: [ "", "§bActual: §a§lDesbloqueado (salida en el mismo lado que la entrada)§r" ]

    # Este ítem se utiliza para alternar la visibilidad e indicar visibilidad pública.
    VisibilityPublic:
      Name: "§b§lAlternar Visibilidad"
      Lore: [ "", "§bActual: §a§lPública§r" ]

    # Este ítem se utiliza para alternar la visibilidad e indicar visibilidad de grupo.
    VisibilityGroup:
      Name: "§b§lAlternar Visibilidad"
      Lore: [ "", "§bActual: §e§lGrupo de región (miembros)§r" ]

    # Este ítem se utiliza para alternar la visibilidad e indicar visibilidad de grupo interna.
    VisibilityGroupInternal:
      Name: "§b§lAlternar Visibilidad"
      Lore: [ "", "§bActual: §e§lGrupo de región (solo visible internamente)§r" ]

    # Este ítem se utiliza para alternar la visibilidad e indicar visibilidad privada.
    VisibilityPrivate:
      Name: "§b§lAlternar Visibilidad"
      Lore: [ "", "§bActual: §c§lPrivada§r" ]

    # Este ítem se utiliza para cambiar e indicar el bloqueo de destino activado.
    TargetLockOn:
      Name: "§b§lAlternar Bloqueo de Destino"
      Lore: [ "", "§bActual: §c§lBloqueado§r" ]

    # Este ítem se utiliza para cambiar e indicar el bloqueo de destino desactivado.
    TargetLockOff:
      Name: "§b§lAlternar Bloqueo de Destino"
      Lore: [ "", "§bActual: §a§lDesbloqueado§r" ]

    # Este ítem se utiliza para volver al menú anterior.
    Back:
      Name: "§6↩ §lVolver"
      Lore: [ ]

    # Configuraciones para el menú de estilo del portal.
  Style:
    # El título para el menú de estilo.
    # %1$s: Nombre del portal
    Title: "§8§lEstilo para: %1$s"
    # El título para el selector de bloque para el bloque de consola activo.
    SelectBlockConsoleActiveTitle: "Seleccionar bloque de consola activo."
    # El título para el selector de bloque para el bloque de origen activo.
    SelectBlockOriginActiveTitle: "Seleccionar bloque de origen activo."
    # El título para el selector de bloque para el bloque de área de portal activo.
    SelectBlockPortalActiveTitle: "Seleccionar bloque de área de portal activo."
    # El título para el selector de bloque para el bloque de variante de límite activo 1.
    SelectBlockBoundary1ActiveTitle: "Seleccionar bloque de variante de límite activo 1."
    # El título para el selector de bloque para el bloque de variante de límite activo 2.
    SelectBlockBoundary2ActiveTitle: "Seleccionar bloque de variante de límite activo 2."
    # El título para el selector de bloque para el bloque de variante de límite activo 3.
    SelectBlockBoundary3ActiveTitle: "Seleccionar bloque de variante de límite activo 3."
    # El título para el selector de bloque para el bloque de variante de límite activo 4.
    SelectBlockBoundary4ActiveTitle: "Seleccionar bloque de variante de límite activo 4."
    # El título para el selector de bloque para el bloque de variante de límite activo 5.
    SelectBlockBoundary5ActiveTitle: "Seleccionar bloque de variante de límite activo 5."
    # El título para el selector de bloque para el bloque de consola inactivo.
    SelectBlockConsoleInactiveTitle: "Seleccionar bloque de consola inactivo."
    # El título para el selector de bloque para el bloque de origen inactivo.
    SelectBlockOriginInactiveTitle: "Seleccionar bloque de origen inactivo."
    # El título para el selector de bloque para el bloque de área de portal inactivo.
    SelectBlockPortalInactiveTitle: "Seleccionar bloque de área de portal inactivo."
    # El título para el selector de bloque para el bloque de variante de límite inactivo 1.
    SelectBlockBoundary1InactiveTitle: "Seleccionar bloque de variante de límite inactivo 1."
    # El título para el selector de bloque para el bloque de variante de límite inactivo 2.
    SelectBlockBoundary2InactiveTitle: "Seleccionar bloque de variante de límite inactivo 2."
    # El título para el selector de bloque para el bloque de variante de límite inactivo 3.
    SelectBlockBoundary3InactiveTitle: "Seleccionar bloque de variante de límite inactivo 3."
    # El título para el selector de bloque para el bloque de variante de límite inactivo 4.
    SelectBlockBoundary4InactiveTitle: "Seleccionar bloque de variante de límite inactivo 4."
    # El título para el selector de bloque para el bloque de variante de límite inactivo 5.
    SelectBlockBoundary5InactiveTitle: "Seleccionar bloque de variante de límite inactivo 5."

    # El ítem utilizado para representar el bloque de consola activo seleccionado.
    # %1$s: Material de construcción
    BlockConsoleActive:
      Name: "§b§lConsola §a(activo)"
      Lore: [ ]

    # El ítem utilizado para representar el bloque de origen activo seleccionado.
    # %1$s: Material de construcción
    BlockOriginActive:
      Name: "§b§lOrigen §a(activo)"
      Lore: [ ]

    # El ítem utilizado para representar el área de portal activa seleccionada.
    # %1$s: Material de construcción
    BlockPortalActive:
      Name: "§b§lÁrea del portal §a(activo)"
      Lore: [ ]

    # El ítem utilizado para representar el bloque de límite activo de variante 1 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary1Active:
      Name: "§b§lLímite §a(activo)"
