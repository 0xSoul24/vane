    # El ítem utilizado para representar el bloque de límite activo de variante 2 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary2Active:
      Name: "§b§lLímite §a(activo)"
      Lore: [ "", "§aVariante 2", "§7Material de construcción: %1$s" ]

    # El ítem utilizado para representar el bloque de límite activo de variante 3 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary3Active:
      Name: "§b§lLímite §a(activo)"
      Lore: [ "", "§aVariante 3", "§7Material de construcción: %1$s" ]

    # El ítem utilizado para representar el bloque de límite activo de variante 4 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary4Active:
      Name: "§b§lLímite §a(activo)"
      Lore: [ "", "§aVariante 4", "§7Material de construcción: %1$s" ]

    # El ítem utilizado para representar el bloque de límite activo de variante 5 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary5Active:
      Name: "§b§lLímite §a(activo)"
      Lore: [ "", "§aVariante 5", "§7Material de construcción: %1$s" ]

    # El ítem utilizado para representar el bloque de consola inactivo seleccionado.
    # %1$s: Material de construcción
    BlockConsoleInactive:
      Name: "§b§lConsola §e(inactivo)"
      Lore: [ ]

    # El ítem utilizado para representar el bloque de origen inactivo seleccionado.
    # %1$s: Material de construcción
    BlockOriginInactive:
      Name: "§b§lOrigen §e(inactivo)"
      Lore: [ ]

    # El ítem utilizado para representar el área de portal inactiva seleccionada.
    # %1$s: Material de construcción
    BlockPortalInactive:
      Name: "§b§lÁrea del portal §e(inactivo)"
      Lore: [ ]

    # El ítem utilizado para representar el bloque de límite inactivo de variante 1 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary1Inactive:
      Name: "§b§lLímite §e(inactivo)"
      Lore: [ "", "§aVariante 1", "§7Material de construcción: %1$s" ]
    # El ítem utilizado para representar el bloque de límite inactivo de la variante 2 seleccionado.
    # %1$s: Material de construcción
    BlockBoundary2Inactive:
      Name: "§b§lLímite §e(inactivo)"
      Lore: [ "", "§aVariante 2", "§7Material de construcción: %1$s" ]
    # El ítem utilizado para representar el bloque de límite inactivo de la variante 3 seleccionado.
    # %1$s: Material de construcción
